test<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介 - こしやま</title>
  <style>
    body {
      margin: 0;
      font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
      background: linear-gradient(to bottom, #ffe4ec, #fffaf0);
      color: #333;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: rgba(255, 182, 193, 0.4);
    }

    header h1 {
      font-size: 2.5em;
      margin: 0;
    }

    header p {
      font-size: 1.2em;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h2 {
      border-left: 6px solid #ff9eb5;
      padding-left: 10px;
    }

    .profile, .hobby, .message {
      margin-bottom: 30px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      color: #777;
    }

    .sakura {
      position: fixed;
      top: -10px;
      width: 10px;
      height: 10px;
      background: pink;
      border-radius: 50%;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }
  </style>
</head>
<body>

<header>
  <h1>こんにちは、こしやまです🌸</h1>
  <p>春のようにやわらかく、前向きに。</p>
</header>

<div class="container">
  <section class="profile">
    <h2>プロフィール</h2>
    <p>名前：こしやま</p>
    <p>出身：日本</p>
    <p>一言：新しいことに挑戦するのが好きです！</p>
  </section>

  <section class="hobby">
    <h2>趣味</h2>
    <ul>
      <li>音楽を聴く</li>
      <li>スポーツ</li>
      <li>友達と遊ぶ</li>
    </ul>
  </section>

  <section class="message">
    <h2>メッセージ</h2>
    <p>
      このページを見てくれてありがとうございます！
      春のように、新しい出会いや経験を大切にしていきたいと思っています。
    </p>
  </section>
</div>

<footer>
  <p>© 2026 こしやま</p>
</footer>

<script>
  function createSakura() {
    const sakura = document.createElement('div');
    sakura.classList.add('sakura');
    sakura.style.left = Math.random() * window.innerWidth + 'px';
    sakura.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(sakura);

    setTimeout(() => {
      sakura.remove();
    }, 5000);
  }

  setInterval(createSakura, 300);
</script>

</body>
</html>
